<div class="page" data-name="taches">
    <div class="navbar">
        <div class="navbar-bg"></div>
        <div class="navbar-inner">
            <div class="title title-bold">My ToDo App</div>
        </div>
    </div>

    <div class="toolbar tabbar toolbar-bottom">
        <div class="toolbar-inner">
            <a href="/" class="tab-link">
                <span class="tabbar-label">Accueil</span>
            </a>
            <a href="/taches/" class="tab-link tab-link-active">
                <span class="tabbar-label">Taches</span>
            </a>
        </div>
    </div>

    <div class="page-content">
        <div class="list">
            <ul>
                <li class="item-content item-input">
                    <div class="item-inner">
                        <div class="item-input-wrap">
                            <input
                                type="text"
                                id="saisie-tache"
                                placeholder="Nouvelle tâche…"
                            />
                        </div>
                    </div>
                </li>
            </ul>
        </div>
        <div class="block">
            <a href="#" class="button button-fill" id="btn-ajouter">
                Ajouter
            </a>
        </div>

        <div class="block">
            <div class="segmented">
                <button class="button filtre-btn button-active" data-filtre="toutes">
                    Toutes
                </button>
                <button class="button filtre-btn" data-filtre="afaire">
                    A faire
                </button>
                <button class="button filtre-btn" data-filtre="faites">
                    Faites
                </button>
            </div>
        </div>

        <div class="block">
            <p class="compteur">0 tâche(s) restante(s)</p>
        </div>

        <div class="list">
            <ul class="liste-taches"></ul>
        </div>

    </div>
</div>
